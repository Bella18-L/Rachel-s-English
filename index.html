<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rachel's English | 老友记英语学习</title>
  <link rel="stylesheet" href="App.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
   const { useState, useEffect, useRef } = React;
   const allSceneTags = [
  '公寓生活', '咖啡馆', '初识', '家庭', '医院', '聊天',
  '职场', '日常', '约会', '闺蜜', '洗衣房', '表演', '友情'
];

interface FriendsEpisode {
  id: string;
  title: string;
  difficulty: '入门' | '进阶' | '地道俚语';
  sceneTags: string[];
  character: 'rachel' | 'monica' | 'phoebe' | 'joey' | 'chandler' | 'ross';
  learned: boolean;
  favorite: boolean;
  duration: string;
  cover: string;
  videoUrl: string;
  subtitles: {
    id: number;
    en: string;
    cn: string;
    time: [number, number];
    isHighlight?: boolean;
  }[];
  highlights: { phrase: string; meaning: string; tip: string }[];
  sceneUsage: string;
}

const friendsEpisodes: FriendsEpisode[] = [
  {
    id: 'S01E01',
    title: 'The Pilot: The First',
    difficulty: '入门',
    sceneTags: ['初识', '公寓生活'],
    character: 'rachel',
    learned: false,
    favorite: false,
    duration: '22:00',
    cover: '/media/covers/s01e01.jpg',
    videoUrl: '/media/videos/s01e01.mp4',
    subtitles: [
      {
        id: 1,
        en: "But we're meeting outside, we're having dinner and it's actually kind of cold when the sun goes down.",
        cn: '我们等会儿要在外面见面吃晚饭，太阳下山后有点冷。',
        time: [504, 518],
        isHighlight: true
      },
      {
        id: 2,
        en: "So I'll have to layer up.",
        cn: '所以我得多穿几层。',
        time: [519, 525]
      }
    ],
    highlights: [
      { phrase: 'layer up', meaning: '多穿几层衣服（保暖）', tip: '连读：lay-er up → /ˈleɪər əp/' },
      { phrase: 'kind of cold', meaning: '有点冷', tip: '比 a little cold 更口语化' }
    ],
    sceneUsage: '日常出门、约饭、提醒对方多穿衣服时使用。'
  },
  {
    id: 'S01E02',
    title: 'The One with the Sonogram at the End',
    difficulty: '入门',
    sceneTags: ['家庭', '公寓生活'],
    character: 'monica',
    learned: false,
    favorite: false,
    duration: '22:00',
    cover: '/media/covers/s01e02.jpg',
    videoUrl: '/media/videos/s01e02.mp4',
    subtitles: [
      { id: 1, en: "We're having a baby.", cn: '我们要有宝宝了。', time: [600, 610], isHighlight: true }
    ],
    highlights: [{ phrase: 'having a baby', meaning: '怀孕', tip: '最常用口语' }],
    sceneUsage: '告知怀孕喜讯'
  }
];

export default function RachelsEnglish() {
  const [darkMode, setDarkMode] = useState(false);
  const [selectedSeason, setSelectedSeason] = useState('S01');
  const [selectedDifficulty, setSelectedDifficulty] = useState('');
  const [selectedTag, setSelectedTag] = useState('');
  const [filteredEpisodes, setFilteredEpisodes] = useState<FriendsEpisode[]>(friendsEpisodes);
  const [currentEpisode, setCurrentEpisode] = useState<FriendsEpisode | null>(null);
  const [activeTab, setActiveTab] = useState<'subtitle' | 'highlights' | 'scene' | 'practice'>('subtitle');
  const [showSplash, setShowSplash] = useState(true);

  const videoRef = useRef<HTMLVideoElement>(null);
  const [currentSubId, setCurrentSubId] = useState<number | null>(null);
  const [playbackRate, setPlaybackRate] = useState(1);
  const [loopSingleLine, setLoopSingleLine] = useState(false);

  const [subMode, setSubMode] = useState<'all' | 'en' | 'cn' | 'none'>(
    () => (localStorage.getItem('subMode') as any) || 'all'
  );

  const [showAnswers, setShowAnswers] = useState(false);

  // ✅ 跟读录音功能（你要的：人模仿发音 + 录音）
  const [recordingSubId, setRecordingSubId] = useState<number | null>(null);
const [recordMap, setRecordMap] = useState<Record<number, string>>({}); // 每句独立录音
const mediaRecorderRef = useRef<MediaRecorder | null>(null);

  // 播放原音
  const playOriginal = (sub: any) => {
    const v = videoRef.current;
    if (!v || !currentEpisode) return;
    const [st, ed] = sub.time;
    v.currentTime = st;
    v.play();
    const stop = () => {
      if (v.currentTime >= ed) {
        v.pause();
        v.removeEventListener('timeupdate', stop);
      }
    };
    v.addEventListener('timeupdate', stop);
  };

  // 开始录音
  const startRecording = (subId: number) => {
    setRecordingSubId(subId);
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      const recorder = new MediaRecorder(stream);
      mediaRecorderRef.current = recorder;
      const chunks: BlobPart[] = [];
      recorder.ondataavailable = (e) => chunks.push(e.data);
      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'audio/mp3' });
        const url = URL.createObjectURL(blob);
        setRecordMap(prev => ({
          ...prev,
          [subId]: url
        }));
      };
      recorder.start();
    });
  };

  // 停止录音
  const stopRecording = () => {
    if (mediaRecorderRef.current) {
      mediaRecorderRef.current.stop();
    }
    setRecordingSubId(null);
  };

  // 播放自己的录音
  const playRecorded = (subId: number) => {
    const url = recordMap[subId];
    if (url) {
      new Audio(url).play();
    }
  };

  useEffect(() => {
    const timer = setTimeout(() => setShowSplash(false), 1600);
    return () => clearTimeout(timer);
  }, []);

  useEffect(() => {
    let res = [...friendsEpisodes];
    res = res.filter(e => e.id.startsWith(selectedSeason));
    if (selectedDifficulty) res = res.filter(e => e.difficulty === selectedDifficulty);
    if (selectedTag) res = res.filter(e => e.sceneTags.includes(selectedTag));
    setFilteredEpisodes(res);
  }, [selectedSeason, selectedDifficulty, selectedTag]);

  useEffect(() => {
    const v = videoRef.current;
    if (!v || !currentEpisode || !loopSingleLine || !currentSubId) return;
    const sub = currentEpisode.subtitles.find(s => s.id === currentSubId);
    if (!sub) return;
    const [st, ed] = sub.time;
    const onTime = () => {
      if (v.currentTime >= ed) {
        v.currentTime = st;
        v.play();
      }
    };
    v.addEventListener('timeupdate', onTime);
    return () => v.removeEventListener('timeupdate', onTime);
  }, [loopSingleLine, currentSubId, currentEpisode]);

  const jumpToSub = (time: number) => {
    if (videoRef.current) {
      videoRef.current.currentTime = time;
      videoRef.current.play();
      videoRef.current.pause();
    }
  };

  const copyLine = (text: string) => {
    navigator.clipboard.writeText(text);
    alert('✅ 已复制到剪贴板');
  };

  const togglePlay = () => {
    if (videoRef.current) {
      videoRef.current.paused ? videoRef.current.play() : videoRef.current.pause();
    }
  };

  const changeSpeed = (e: React.ChangeEvent<HTMLSelectElement>) => {
    const r = parseFloat(e.target.value);
    setPlaybackRate(r);
    if (videoRef.current) videoRef.current.playbackRate = r;
  };

  const prevSub = () => {
    if (!currentEpisode) return;
    const total = currentEpisode.subtitles.length;
    const idx = currentSubId ? currentEpisode.subtitles.findIndex(s => s.id === currentSubId) : -1;
    const nextIdx = idx > 0 ? idx - 1 : 0;
    const target = currentEpisode.subtitles[nextIdx];
    if (target) {
      setCurrentSubId(target.id);
      jumpToSub(target.time[0]);
    }
  };

  const nextSub = () => {
    if (!currentEpisode) return;
    const total = currentEpisode.subtitles.length;
    const idx = currentSubId ? currentEpisode.subtitles.findIndex(s => s.id === currentSubId) : -1;
    const nextIdx = idx < total - 1 ? idx + 1 : total - 1;
    const target = currentEpisode.subtitles[nextIdx];
    if (target) {
      setCurrentSubId(target.id);
      jumpToSub(target.time[0]);
    }
  };

  const getBlankLine = (en: string) => {
    const words = en.split(' ');
    if (words.length < 3) return en;
    const blanked = [...words];
    const pos = Math.floor(words.length * 0.4);
    blanked[pos] = '______';
    if (words.length > 6) {
      const pos2 = Math.floor(words.length * 0.7);
      blanked[pos2] = '______';
    }
    return blanked.join(' ');
  };

  const learnedNum = filteredEpisodes.filter(e => e.learned).length;
  const favNum = filteredEpisodes.filter(e => e.favorite).length;
  const checkin = learnedNum;

  const toggleLearned = (id: string) => {
    setFilteredEpisodes(prev => prev.map(e => e.id === id ? { ...e, learned: !e.learned } : e));
  };

  const toggleFavorite = (id: string) => {
    setFilteredEpisodes(prev => prev.map(e => e.id === id ? { ...e, favorite: !e.favorite } : e));
  };

  return (
    <>
      {showSplash && (
        <div className="splash">
          <div className="splash-content">
            <h1>☕ Friends English</h1>
            <p>老友记口语学习馆 · 看美剧，学地道发音</p>
          </div>
        </div>
      )}

      <div className={`app ${darkMode ? 'dark' : ''}`}>
        <header className="header">
          <div className="brand">
            <span className="logo">☕</span>
            <div>
              <h1 className="title">Friends English</h1>
              <p className="subtitle">老友记口语学习馆</p>
            </div>
          </div>
          <div className="header-actions">
            <button className="btn-premium">✨ 纯净学习</button>
            <button className="btn-toggle-dark" onClick={() => setDarkMode(!darkMode)}>
              {darkMode ? '☀️ 浅色' : '🌙 深色'}
            </button>
          </div>
        </header>

        <main className="main">
          <aside className="sidebar">
            <div className="card stats">
              <h2>📊 我的学习数据</h2>
              <div className="stats-list">
                <div className="stat-row">
                  <span className="stat-label">已学习</span>
                  <span className="stat-value">{learnedNum}</span>
                </div>
                <div className="stat-row">
                  <span className="stat-label">打卡数</span>
                  <span className="stat-value">{checkin}</span>
                </div>
                <div className="stat-row">
                  <span className="stat-label">已收藏</span>
                  <span className="stat-value">{favNum}</span>
                </div>
              </div>
            </div>

            <div className="card filter">
              <h2>🔍 筛选剧集</h2>
              <div className="filter-group">
                <label>季数</label>
                <select value={selectedSeason} onChange={e => setSelectedSeason(e.target.value)}>
                  <option value="S01">第一季</option>
                  <option value="S02">第二季</option>
                  <option value="S03">第三季</option>
                  <option value="S04">第四季</option>
                </select>
              </div>

              <div className="filter-group">
                <label>难度</label>
                <div className="tag-group">
                  <button className={selectedDifficulty === '' ? 'active' : ''} onClick={() => setSelectedDifficulty('')}>全部</button>
                  <button className={selectedDifficulty === '入门' ? 'active' : ''} onClick={() => setSelectedDifficulty('入门')}>入门</button>
                  <button className={selectedDifficulty === '进阶' ? 'active' : ''} onClick={() => setSelectedDifficulty('进阶')}>进阶</button>
                  <button className={selectedDifficulty === '地道俚语' ? 'active' : ''} onClick={() => setSelectedDifficulty('地道俚语')}>俚语</button>
                </div>
              </div>

              <div className="filter-group">
                <label>场景</label>
                <div className="tag-group">
                  <button className={selectedTag === '' ? 'active' : ''} onClick={() => setSelectedTag('')}>全部</button>
                  {allSceneTags.map(tag => (
                    <button key={tag} className={selectedTag === tag ? 'active' : ''} onClick={() => setSelectedTag(tag)}>
                      {tag}
                    </button>
                  ))}
                </div>
              </div>

            </div>
          </aside>

          <section className="content">
            <div className="content-head">
              <h2>{selectedSeason} · 经典剧集</h2>
              <span>共 {filteredEpisodes.length} 集</span>
            </div>

            <div className="episode-grid">
              {filteredEpisodes.map(ep => (
                <div key={ep.id} className="episode-card" onClick={() => setCurrentEpisode(ep)}>
                  <div className="cover">
                    <img src={ep.cover} alt="" />
                    <span className="duration">{ep.duration}</span>
                    <span className="char-avatar">
                      <img src={`/avatars/${ep.character}.jpg`} alt={ep.character} className="char-img" />
                    </span>
                    {ep.favorite && <span className="badge fav">❤️ 收藏</span>}
                    {ep.learned && <span className="badge learn">✅ 已学</span>}
                  </div>
                  <div className="info">
                    <p className="sid">{ep.id}</p>
                    <h3 className="etitle">{ep.title}</h3>
                    <div className="tags">
                      {ep.sceneTags.slice(0,2).map(t=><span key={t} className="tag-scene">{t}</span>)}
                      <span className={`tag-diff ${ep.difficulty}`}>{ep.difficulty}</span>
                    </div>
                    <div className="card-btns">
                      <button className="btn-learn" onClick={e => { e.stopPropagation(); toggleLearned(ep.id); }}>
                        {ep.learned ? '✅ 已学' : '📖 标记已学'}
                      </button>
                      <button className="btn-fav" onClick={e => { e.stopPropagation(); toggleFavorite(ep.id); }}>
                        {ep.favorite ? '❤️ 已收藏' : '🤍 收藏'}
                      </button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </section>
        </main>

        {currentEpisode && (
          <div className="modal-overlay" onClick={() => { setCurrentEpisode(null); setLoopSingleLine(false); }}>
            <div className="modal" onClick={e => e.stopPropagation()}>
              <div className="modal-head">
                <div>
                  <h2>{currentEpisode.id} · {currentEpisode.title}</h2>
                </div>
                <button className="modal-close" onClick={() => setCurrentEpisode(null)}>✕</button>
              </div>

              <div className="modal-body">
                <div className="video-part">
                  <video ref={videoRef} src={currentEpisode.videoUrl} controls className="player" />
                  <div className="controls">
                    <button onClick={prevSub}>⬅️ 上一句</button>
                    <button onClick={togglePlay}>⏯️ 播放/暂停</button>
                    <button onClick={nextSub}>下一句 ➡️</button>
                    <button className={loopSingleLine ? 'active' : ''} onClick={() => setLoopSingleLine(!loopSingleLine)}>🔁 单句循环</button>
                    <select value={playbackRate} onChange={changeSpeed}>
                      <option value="0.7">0.75x</option>
                      <option value="1">1.0x</option>
                      <option value="1.25">1.25x</option>
                      <option value="1.5">1.5x</option>
                    </select>
                    <select value={subMode} onChange={e => setSubMode(e.target.value as any)}>
                      <option value="all">双语字幕</option>
                      <option value="en">仅英文</option>
                      <option value="cn">仅中文</option>
                      <option value="none">无字幕</option>
                    </select>
                  </div>
                </div>

                <div className="panel-part">
                  <div className="tabs">
                    <button className={activeTab === 'subtitle' ? 'active' : ''} onClick={() => setActiveTab('subtitle')}>📝 字幕剧本</button>
                    <button className={activeTab === 'highlights' ? 'active' : ''} onClick={() => setActiveTab('highlights')}>✨ 重点表达</button>
                    <button className={activeTab === 'scene' ? 'active' : ''} onClick={() => setActiveTab('scene')}>🗣️ 场景用法</button>
                    <button className={activeTab === 'practice' ? 'active' : ''} onClick={() => setActiveTab('practice')}>✏️ 练习</button>
                  </div>

                  <div className="panel-content">
                    {activeTab === 'subtitle' && (
                      <div className="sub-list">
                        {currentEpisode.subtitles.map(sub => (
                          <div 
                            key={sub.id} 
                            className={`sub-item ${currentSubId === sub.id ? 'active' : ''} ${sub.isHighlight ? 'hl' : ''}`}
                            onClick={() => { setCurrentSubId(sub.id); jumpToSub(sub.time[0]); }}
                          >
                            <div className="sub-texts">
                              <p className="en">{sub.en}</p>
                              {(subMode === 'all' || subMode === 'cn') && <p className="cn">{sub.cn}</p>}

                              {/* ✅ 你要的跟读：原音 + 录音 + 回放 */}
                              <div className="read-row">
                                <button onClick={(e) => {
                                  e.stopPropagation();
                                  playOriginal(sub);
                                }}>🔈 原音</button>

                                {recordingSubId !== sub.id ? (
                                  <button onClick={(e) => {
                                    e.stopPropagation();
                                    startRecording(sub.id);
                                  }}>🎙️ 录音</button>
                                ) : (
                                  <button className="recording" onClick={(e) => {
                                    e.stopPropagation();
                                    stopRecording();
                                  }}>⏹ 停止</button>
                                )}

                                {recordMap[sub.id] && (
                                  <button onClick={(e) => {
                                    e.stopPropagation();
                                    playRecorded(sub.id);
                                  }}>▶ 我的录音</button>
                                )}
                              </div>
                            </div>
                            <button className="btn-copy" onClick={(e) => { e.stopPropagation(); copyLine(sub.en); }}>📋</button>
                          </div>
                        ))}
                      </div>
                    )}

                    {activeTab === 'highlights' && (
                      <div className="highlights-box">
                        {currentEpisode.highlights.map((h,i)=>(
                          <div key={i} className="hl-item">
                            <h4>🔸 {h.phrase}</h4>
                            <p>释义：{h.meaning}</p>
                            <p>技巧：{h.tip}</p>
                          </div>
                        ))}
                      </div>
                    )}

                    {activeTab === 'scene' && (
                      <div className="scene-box">
                        <h3>🗣️ 适用场景</h3>
                        <p>{currentEpisode.sceneUsage}</p>
                      </div>
                    )}

                    {activeTab === 'practice' && (
                      <div className="practice-box">
                        <div className="practice-head">
                          <h3>✏️ 整集填空练习</h3>
                          <button onClick={() => setShowAnswers(!showAnswers)} className="answer-btn">
                            {showAnswers ? '🙈 隐藏答案' : '👀 显示答案'}
                          </button>
                        </div>
                        <div className="blank-list">
                          {currentEpisode.subtitles.map((sub, idx) => (
                            <div key={sub.id} className="blank-item">
                              <p className="blank-en">
                                {showAnswers ? sub.en : getBlankLine(sub.en)}
                              </p>
                              <p className="blank-cn">{sub.cn}</p>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}

        <footer className="footer">
          ✨ 老友记口语学习平台 | 制作:Rachel's English 
        </footer>
      </div>
    </>
  );
}
  </script>
</body>
</html>
